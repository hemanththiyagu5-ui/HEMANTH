<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Popup</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 100px;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
    }

    /* Popup background */
    .popup {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
    }

    /* Popup box */
    .popup-content {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 300px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        text-align: center;
    }

    .close-btn {
        background: crimson;
        color: white;
        border: none;
        padding: 8px 15px;
        margin-top: 10px;
        border-radius: 5px;
    }
</style>
</head>
<body>

<h2>Popup Example</h2>

<button onclick="openPopup()">Open Popup</button>

<div class="popup" id="popup">
    <div class="popup-content">
        <h3>Hello!</h3>
        <p>This is a simple popup window.</p>
        <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
</div>

<script>
function openPopup() {
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
